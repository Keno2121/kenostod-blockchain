<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E8B57;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B6F44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FFFD4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#50C878;stop-opacity:0.1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield Shadow -->
  <path d="M100 10 L180 40 L180 110 Q180 170 100 230 Q20 170 20 110 L20 40 Z" 
        fill="#000000" opacity="0.2" transform="translate(0,6)" filter="url(#shadow)"/>
  
  <!-- Main Shield Body -->
  <path d="M100 10 L180 40 L180 110 Q180 170 100 230 Q20 170 20 110 L20 40 Z" 
        fill="url(#emeraldGradient)" stroke="#0B6F44" stroke-width="3"/>
  
  <!-- Shield Highlight -->
  <path d="M100 10 L180 40 L180 110 Q180 150 140 180" 
        fill="none" stroke="url(#highlightGradient)" stroke-width="8" opacity="0.4"/>
  
  <!-- Inner Shield Border -->
  <path d="M100 25 L165 50 L165 105 Q165 155 100 205 Q35 155 35 105 L35 50 Z" 
        fill="none" stroke="#50C878" stroke-width="2" opacity="0.5"/>
  
  <!-- Emerald Gem Center -->
  <g transform="translate(100, 100)">
    <!-- Hexagonal emerald gem -->
    <polygon points="0,-35 30,-17.5 30,17.5 0,35 -30,17.5 -30,-17.5" 
             fill="#3FE0A0" stroke="#0B6F44" stroke-width="2"/>
    
    <!-- Gem facets -->
    <polygon points="0,-35 30,-17.5 0,0 -30,-17.5" fill="#50C878" opacity="0.7"/>
    <polygon points="-30,-17.5 0,0 -30,17.5" fill="#2E8B57" opacity="0.8"/>
    <polygon points="30,-17.5 0,0 30,17.5" fill="#2E8B57" opacity="0.8"/>
    <polygon points="-30,17.5 0,0 0,35" fill="#1B4D2F" opacity="0.9"/>
    <polygon points="30,17.5 0,0 0,35" fill="#1B4D2F" opacity="0.9"/>
    
    <!-- Gem highlight -->
    <polygon points="0,-35 15,-26 0,-10 -15,-26" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="0" cy="-20" r="4" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- KENO Text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="#FFFFFF" text-anchor="middle" stroke="#0B6F44" stroke-width="1">KENO</text>
  
  <!-- Decorative stars -->
  <circle cx="50" cy="60" r="3" fill="#7FFFD4" opacity="0.8"/>
  <circle cx="150" cy="60" r="3" fill="#7FFFD4" opacity="0.8"/>
  <circle cx="70" cy="140" r="2" fill="#7FFFD4" opacity="0.6"/>
  <circle cx="130" cy="140" r="2" fill="#7FFFD4" opacity="0.6"/>
</svg>
