<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <!-- Emerald Shield Gradients -->
    <linearGradient id="emeraldShieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E8B57;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B6F44;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradients for K -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldCircleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Highlight Gradients -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FFFD4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#50C878;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gold Glow Filter -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="0" result="offsetblur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.8"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield Shadow -->
  <path d="M100 10 L180 40 L180 110 Q180 170 100 230 Q20 170 20 110 L20 40 Z" 
        fill="#000000" opacity="0.2" transform="translate(0,6)" filter="url(#shadow)"/>
  
  <!-- Main Shield Body (Emerald) -->
  <path d="M100 10 L180 40 L180 110 Q180 170 100 230 Q20 170 20 110 L20 40 Z" 
        fill="url(#emeraldShieldGradient)" stroke="#0B6F44" stroke-width="3"/>
  
  <!-- Shield Highlight -->
  <path d="M100 10 L180 40 L180 110 Q180 150 140 180" 
        fill="none" stroke="url(#highlightGradient)" stroke-width="8" opacity="0.4"/>
  
  <!-- Inner Shield Border -->
  <path d="M100 25 L165 50 L165 105 Q165 155 100 205 Q35 155 35 105 L35 50 Z" 
        fill="none" stroke="#50C878" stroke-width="2" opacity="0.5"/>
  
  <!-- Gold Blockchain Circle -->
  <g transform="translate(100, 100)">
    <!-- Outer Gold Ring -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="url(#goldCircleGradient)" stroke-width="6" opacity="0.9" filter="url(#goldGlow)"/>
    
    <!-- Blockchain Links (Gold) -->
    <circle cx="-30" cy="-30" r="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="30" cy="-30" r="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="-42" cy="0" r="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="42" cy="0" r="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="-30" cy="30" r="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1.5"/>
    
    <!-- Connection Lines (subtle gold) -->
    <line x1="-30" y1="-30" x2="30" y2="-30" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    <line x1="-42" y1="0" x2="42" y2="0" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="30" x2="30" y2="30" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="-30" x2="-42" y2="0" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-30" x2="42" y2="0" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    <line x1="-42" y1="0" x2="-30" y2="30" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    <line x1="42" y1="0" x2="30" y2="30" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    
    <!-- Inner Circle Background (semi-transparent) -->
    <circle cx="0" cy="0" r="35" fill="#0B6F44" opacity="0.8"/>
    
    <!-- Exquisite Gold "K" Letter -->
    <g filter="url(#goldGlow)">
      <!-- K vertical stem -->
      <path d="M -15 -25 L -15 25 L -8 25 L -8 -25 Z" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="0.5"/>
      
      <!-- K upper diagonal -->
      <path d="M -8 -5 L 15 -25 L 20 -20 L 2 -5 L -8 5 Z" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="0.5"/>
      
      <!-- K lower diagonal -->
      <path d="M 0 0 L 20 20 L 15 25 L -8 5 Z" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="0.5"/>
      
      <!-- Highlight on K -->
      <path d="M -14 -25 L -10 -25 L -10 -15 Z" fill="#FFED4E" opacity="0.7"/>
      <circle cx="16" cy="-22" r="2" fill="#FFED4E" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Decorative Gold Stars -->
  <circle cx="50" cy="60" r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="150" cy="60" r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="70" cy="140" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="130" cy="140" r="2" fill="#FFD700" opacity="0.7"/>
  
  <!-- KENO Text Inside Shield -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        fill="url(#goldGradient)" text-anchor="middle" stroke="#B8860B" stroke-width="0.8" filter="url(#goldGlow)">KENO</text>
</svg>
