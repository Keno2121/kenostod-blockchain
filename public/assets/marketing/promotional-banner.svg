<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B6F44;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1f14;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.3" />
    </linearGradient>
    
    <linearGradient id="textGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Decorative Pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="#50C878" opacity="0.3"/>
    <circle cx="1100" cy="500" r="100" fill="#50C878" opacity="0.3"/>
    <circle cx="200" cy="500" r="60" fill="#FFD700" opacity="0.2"/>
    <circle cx="1000" cy="100" r="70" fill="#FFD700" opacity="0.2"/>
  </g>
  
  <!-- Blockchain Network Pattern -->
  <g opacity="0.15" stroke="#50C878" stroke-width="2" fill="none">
    <line x1="50" y1="300" x2="150" y2="200"/>
    <line x1="150" y1="200" x2="250" y2="250"/>
    <line x1="250" y1="250" x2="150" y2="400"/>
    <circle cx="50" cy="300" r="8" fill="#50C878"/>
    <circle cx="150" cy="200" r="8" fill="#50C878"/>
    <circle cx="250" cy="250" r="8" fill="#50C878"/>
    <circle cx="150" cy="400" r="8" fill="#50C878"/>
  </g>
  
  <!-- Logo (Left Side) -->
  <g transform="translate(120, 180)">
    <!-- Shield -->
    <path d="M0 -100 L60 -80 L60 -20 Q60 20 0 80 Q-60 20 -60 -20 L-60 -80 Z" 
          fill="url(#bgGradient)" stroke="#50C878" stroke-width="3" opacity="0.9"/>
    <path d="M0 -100 L60 -80 L60 -20 Q60 20 0 80 Q-60 20 -60 -20 L-60 -80 Z" 
          fill="none" stroke="url(#goldShine)" stroke-width="5" opacity="0.3"/>
    
    <!-- Gold Circle -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="url(#textGold)" stroke-width="5" opacity="0.9" filter="url(#glow)"/>
    
    <!-- K Letter -->
    <g filter="url(#glow)">
      <path d="M -12 -20 L -12 20 L -6 20 L -6 -20 Z" fill="url(#textGold)"/>
      <path d="M -6 -4 L 12 -20 L 16 -16 L 2 -4 L -6 4 Z" fill="url(#textGold)"/>
      <path d="M 0 0 L 16 16 L 12 20 L -6 4 Z" fill="url(#textGold)"/>
    </g>
    
    <!-- KENO text on shield -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
          fill="url(#textGold)" text-anchor="middle" filter="url(#glow)">KENO</text>
  </g>
  
  <!-- Main Content -->
  <g transform="translate(350, 150)">
    <!-- Main Title -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
          fill="#FFFFFF" filter="url(#glow)">
      KENO TOKEN ICO
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="600" 
          fill="#50C878">
      Blockchain Education Meets Real Value
    </text>
    
    <!-- Private Sale Section -->
    <g transform="translate(0, 120)">
      <rect x="0" y="0" width="380" height="100" rx="10" fill="rgba(255, 215, 0, 0.15)" stroke="#FFD700" stroke-width="2"/>
      <text x="190" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
            fill="#FFD700" text-anchor="middle">
        🔥 PRIVATE SALE NOW LIVE
      </text>
      <text x="190" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
            fill="url(#textGold)" text-anchor="middle" filter="url(#glow)">
        $0.01 per KENO
      </text>
      <text x="190" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="600" 
            fill="#FFFFFF" text-anchor="middle">
        + 20% BONUS TOKENS
      </text>
    </g>
    
    <!-- Key Features -->
    <g transform="translate(400, 120)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">
        ✓ BEP-20 on Binance Smart Chain
      </text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">
        ✓ Proof-of-Residual-Value (PoRV)
      </text>
      <text x="0" y="70" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">
        ✓ Verified Smart Contracts
      </text>
    </g>
    
    <!-- Sale Dates -->
    <g transform="translate(0, 250)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#FFD700">
        Private Sale: Nov 28 - Dec 28, 2025
      </text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#50C878">
        Public Sale: Dec 29 - Feb 27, 2026
      </text>
    </g>
  </g>
  
  <!-- Call to Action -->
  <g transform="translate(350, 530)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">
      🌐 kenostodblockchain.com
    </text>
    <text x="450" y="0" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#50C878">
      | Join the Revolution
    </text>
  </g>
  
  <!-- Decorative Stars -->
  <g fill="#FFD700" opacity="0.8">
    <circle cx="320" cy="180" r="4"/>
    <circle cx="1050" cy="250" r="5"/>
    <circle cx="900" cy="450" r="3"/>
    <circle cx="1100" cy="150" r="4"/>
  </g>
</svg>
