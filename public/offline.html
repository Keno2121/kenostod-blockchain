<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Kenostod Blockchain Academy</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .icon { font-size: 4rem; margin-bottom: 24px; }
        h1 { font-size: 1.5rem; margin-bottom: 12px; color: #f8fafc; }
        p { color: #94a3b8; font-size: 0.95rem; max-width: 320px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .logo { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <img src="/logo.png" alt="Kenostod" class="logo">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection right now. Your KENO progress is safe — reconnect to continue your courses and access the UTL dashboard.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
