<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenostod Owner Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
        }
        h1 { color: #f8fafc; font-size: 1.6rem; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; }
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #f8fafc;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #10b981; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
        }
        .success {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.3);
            color: #34d399;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
        }
        .back { margin-top: 24px; }
        .back a { color: #64748b; font-size: 0.85rem; text-decoration: none; }
        .back a:hover { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛡️</div>
        <h1>Owner Preview</h1>
        <p>Enter your admin password to unlock all courses and curriculum for review.</p>

        <div id="error-msg" class="error"></div>
        <div id="success-msg" class="success"></div>

        <input type="password" id="pwd" placeholder="Admin Password" autocomplete="current-password" />
        <button id="unlock-btn" onclick="unlock()">Unlock All Courses</button>

        <div class="back"><a href="/">← Back to site</a></div>
    </div>

    <script>
        document.getElementById('pwd').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') unlock();
        });

        async function unlock() {
            const pwd = document.getElementById('pwd').value.trim();
            if (!pwd) return;

            const btn = document.getElementById('unlock-btn');
            const errEl = document.getElementById('error-msg');
            const okEl = document.getElementById('success-msg');
            errEl.style.display = 'none';
            okEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const resp = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                const data = await resp.json();

                if (data.success) {
                    localStorage.setItem('subscriptionPlan', 'professional');
                    localStorage.setItem('subscriptionActive', 'true');
                    localStorage.setItem('subscriptionDate', new Date().toISOString());
                    localStorage.setItem('kenostodAdmin', 'true');
                    okEl.textContent = '✅ All courses unlocked! Redirecting...';
                    okEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/backoffice.html?mode=student&tab=courses';
                    }, 1200);
                } else {
                    errEl.textContent = 'Incorrect password. Please check and try again.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Unlock All Courses';
                }
            } catch (e) {
                errEl.textContent = 'Connection error. Make sure the server is running.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Unlock All Courses';
            }
        }

        document.getElementById('pwd').focus();
    </script>
</body>
</html>
