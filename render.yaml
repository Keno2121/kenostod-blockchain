services:
  - type: web
    name: kenostod-sovereign-economy
    runtime: node
    plan: starter
    buildCommand: npm install --legacy-peer-deps
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BANK_ENCRYPTION_KEY
        sync: false
      - key: BRIDGE_API_KEY
        sync: false
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: KENO_WALLET_PRIVATE_KEY
        sync: false
      - key: MOONPAY_PUBLISHABLE_KEY
        sync: false
      - key: NEW_WALLET_PRIVATE_KEY
        sync: false
      - key: NPM_ACCESS_TOKEN
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WALLETCONNECT_PROJECT_ID
        sync: false
      - key: FAL_ALERT_CHAT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
